name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint all projects
        run: npx nx run-many --target=lint --all --parallel=3

      - name: Build API
        run: npx nx build api

      - name: Build Client
        run: npx nx build client --configuration=production

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t hackathon-api:latest .

      - name: Build Client image
        run: docker build -f docker/Dockerfile.client -t hackathon-client:latest .
