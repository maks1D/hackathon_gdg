# ═══════════════════════════════════════════════════════════════════
# Docker Compose — Production Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════

services:
  api:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  client:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: always
